# ---------------------------------------------------------------------------
#  Multicloud DB TODO App - Spanner Emulator Configuration
# ---------------------------------------------------------------------------
# Usage:  -Dtodo.config=todo-app-spanner.properties
#
# Prerequisites:
#   docker run -p 9010:9010 -p 9020:9020 gcr.io/cloud-spanner-emulator/emulator
#   Then create instance + database (see multiclouddb-samples/README.md).
#
multiclouddb.provider=spanner

# --- Application Settings ---------------------------------------------------
multiclouddb.database=testdb
multiclouddb.collection=todos

# --- Google Cloud Spanner (Emulator) ----------------------------------------
multiclouddb.connection.projectId=test-project
multiclouddb.connection.instanceId=test-instance
multiclouddb.connection.databaseId=todoapp
multiclouddb.connection.emulatorHost=localhost:9010
